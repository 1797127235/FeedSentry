services:
  feedsentry:
    build: .
    restart: unless-stopped
    environment:
      FEEDSENTRY_CONFIG: /config/config.yaml
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      FIRECRAWL_BASE_URL: ${FIRECRAWL_BASE_URL}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      APPRISE_BASE_URL: ${APPRISE_BASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NAPCAT_BASE_URL: ${NAPCAT_BASE_URL:-http://host.docker.internal:3000}
      NAPCAT_TOKEN: ${NAPCAT_TOKEN:-}
      FEEDSENTRY_MCP_TOKEN: ${FEEDSENTRY_MCP_TOKEN:-}
      FEEDSENTRY_MCP_ALLOWED_HOSTS: ${FEEDSENTRY_MCP_ALLOWED_HOSTS:-localhost,localhost:*,127.0.0.1,127.0.0.1:*}
    volumes:
      - ./config:/config
      - ./data:/app/data
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:${FEEDSENTRY_PORT:-8000}:8000"
